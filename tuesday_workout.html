<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">

    <body>
        <a href="index.html" class="home-button">

        </a>
        <h1 id="header">💙Tuesday- Legs & Core💙</h1>
        <details id="warm_up_card">
            <summary id="header_card">🔥Warm-Up (5-10 min)</summary>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Incline Treadmill Walk</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Knee Raises</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Leg Swings</span>
                    </label>
                </div>
        </details>
        <details id="dumbbells_card">
            <summary id="header_card">🏋️Dumbbells</summary>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Goblet Squat (3 sets, 10 reps)</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Romanian Deadlifts (3 sets, 15 reps)</span>
                    </label>
                </div>
        </details>
        <details id="machine_card">
            <summary id="header_card">🏋️Machine</summary>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Leg Press (4 sets, 10 reps)</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Hamstring Curl (3 sets, 10 reps)</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Adductor Machines (3 sets, 12 reps)</span>
                    </label>
                </div>
        </details>
        <details id="core_card">
            <summary id="header_card">🏋️Core</summary>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Cable Crunch (3 sets, 12 reps)</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Plank (3 sets, 45 secs)</span>
                    </label>
                </div>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Plank (3 sets, 12 reps)</span>
                    </label>
                </div>
        </details>
        <details id="stretching">
            <summary id="header_card">🧘‍♀️Stretching</summary>
            <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Hip Flexor Stretch</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Hamstring Stretch</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Child's Pose</span>
                    </label>
                </div>
        </details>
        <details id="cardio">
            <summary id="header_card">🏃‍♂️Cardio</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Japanese Walking Method: 30 mins</span>
                </label>
            </div>
        </details>
        <details id="sauna">
            <summary id="header_card">♨️Sauna</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>15-20 mins</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Rehydrate After</span>

        </details>
