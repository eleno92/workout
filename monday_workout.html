<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <a href="index.html" class="home-button">
            ← Back to Home
        </a>
        <h1 id="header">💖Monday- Glutes & Inner Thighs💖</h1>
        <details id="warm_up_card">
            <summary id="header_card">🔥Warm-Up (5-10 min)</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Incline Treadmill Walk</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Leg swings</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Bodyweight squats (1 set, 15 reps)</span>
                </label>
            </div>
        </details>
        <details id="dumbbells_card">
            <summary id="header_card">🏋️Dumbbells</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Barbell Squat (4 sets, 8 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Dumbbell Walking Lunges (3 sets, 12 reps (each leg))</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Dumbbell Romanian Deadlift (3 sets, 12 reps (each leg))</span>
                </label>
            </div>
        </details>
        <details id="machine_card">
            <summary id="header_card">🏋️Machine</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Hip Thrust Machine (4 sets, 10 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Adductor Machines (3 sets, 15 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Wide Stance Leg Press (3 sets, 12 reps)</span>
                </label>
            </div>
        </details>
        <details id="stretching">
            <summary id="header_card">🧘‍♀️Stretching (5 mins)</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Quad Stretch</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Hamstring Stretch</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Figure-4 Glute Stretch</span>
                </label>
            </div>
        </details>
        <details id="cardio">
            <summary id="header_card">🏃‍♂️Cardio</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Japanese Walking Method: 30 mins</span>
                </label>
            </div>
        </details>
        <details id="sauna">
            <summary id="header_card">♨️Sauna</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>15-20 mins</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Rehydrate After</span>
                    <img src="https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyNWhicm1kNDJkY2x4cDUzNnIwbTNyMnZ5NTEwaGd1c2l3MHhsZTA5ciZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/XEHhfEvGc89ablCLXz/200.gif" alt="rehydrate">
                </label>
            </div>
        </details>
    </body>
</html>
