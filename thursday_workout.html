<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <a href="index.html" class="home-button">
            ← Back to Home
        </a>
        <h1 id="header">💙Thursday- Arms & Back💙</h1>
        <details id="warm_up_card">
            <summary id="header_card">🔥Warm-Up (5-10 min)</summary>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Treadmill Walk</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Arm Circles</span>
                    </label>
                </div>
                <br>
        </details>
        <details id="dumbbells_card">
            <summary id="header_card">🏋️Dumbbells</summary>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>One-Arm Dumbbell Row (3 sets, 10 reps (each side))</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Dumbbell Bicep Curl (3 sets, 12 reps)</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Hammer Curl (3 sets, 12 reps)</span>
                    </label>
                </div>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Overhead Dumbbell Tricep Extension (3 sets, 12 reps)</span>
                    </label>
                </div>
        </details>
        <details id="machine_card">
            <summary id="header_card">🏋️Machine</summary>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Lat Pulldown (4 sets, 10 reps)</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Seated Cable Row (4 sets, 10 reps)</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Triceps Pulldowns (3 sets, 15 reps)</span>
                    </label>
                </div>
        </details>
        <details id="core_card">
            <summary id="header_card">🏋️Core</summary>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Dead Bugs (3 sets, 12 reps (each side))</span>
                    </label>
                </div>
        </details>
        <details id="stretching">
            <summary id="header_card">🧘‍♀️Stretching</summary>
            <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Biceps Stretch</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Triceps Stretch</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Upper-back Stretch</span>
                    </label>
                </div>
        </details>
        <details id="cardio">
            <summary id="header_card">🏃‍♂️Cardio</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Japanese Walking Method: 30 mins</span>
                </label>
            </div>
        </details>
        <details id="sauna">
            <summary id="header_card">♨️Sauna</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>15-20 mins</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Rehydrate After</span>
                    <img src="https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyNWhicm1kNDJkY2x4cDUzNnIwbTNyMnZ5NTEwaGd1c2l3MHhsZTA5ciZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/XEHhfEvGc89ablCLXz/200.gif" alt="rehydrate">
                </label>
            </div>
        </details>
    </body>
</html>
