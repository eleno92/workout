<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <a href="index.html" class="home-button">
            ← Back to Home
        </a>
        <h1 id="header">💚Saturday- Upper Body Power💚</h1>
        <details id="warm_up_card">
            <summary id="header_card">🔥Warm-Up (5-10 min)</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Treadmill Walk</span>
                </label>
            </div>
        </details>
        <details id="dumbbells_card">
            <summary id="header_card">🏋️Dumbbells</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Shoulder Press (3 sets, 10 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Lateral Raise (3 sets, 12 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Bicep Curl (3 sets, 15 reps)</span>
                </label>
            </div>
        </details>
        <details id="machine_card">
            <summary id="header_card">🏋️Machine</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Lat Pulldown (3 sets, 10 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Seated Row (3 sets, 12 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Chest Press (3 sets, 12 reps)</span>
                </label>
            </div>
        </details>
        <details id="core_card">
            <summary id="header_card">🏋️Core</summary>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Cable Crunch (3 sets, 15 reps)</span>
                    </label>
                </div>
                <br>
                <div id="exercise">
                    <label class="exercise-label">
                        <input type="checkbox">
                        <span>Plank (60 secs)</span>
                    </label>
                </div>
        </details>
        <details id="stretching">
            <summary id="header_card">🧘‍♀️Stretching (5 mins)</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Full-body Stretch</span>
                </label>
            </div>
        </details>
        <details id="cardio">
            <summary id="header_card">🏃‍♂️Cardio</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Japanese Walking Method: 30 mins</span>
                </label>
            </div>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Stairmaster: 15 mins</span>
                </label>
            </div>
        </details>
        <details id="sauna">
            <summary id="header_card">♨️Sauna</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>15-20 mins</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Rehydrate After</span>
                    <img src="https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyNWhicm1kNDJkY2x4cDUzNnIwbTNyMnZ5NTEwaGd1c2l3MHhsZTA5ciZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/XEHhfEvGc89ablCLXz/200.gif" alt="rehydrate">
                </label>
            </div>
        </details>
    </body>
</html>
