<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <a href="index.html" class="home-button">
            ← Back to Home
        </a>
        <h1 id="header">💖Wednesday- Chest, Shoulders & Arms💖</h1>
        <details id="warm_up_card">
            <summary id="header_card">🔥Warm-Up (5-10 min)</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Incline Treadmill Walk</span>
                </label>
            </div>
        </details>
        <details id="dumbbells_card">
            <summary id="header_card">🏋️Dumbbells</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Incline Dumbbell Press (3 sets, 10 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Shoulder Press (3 sets, 10 reps (each leg))</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Lateral Raise (3 sets, 10 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Hammer Curl (3 sets, 10 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Overhead Triceps Extension (3 sets, 12 reps)</span>
                </label>
            </div>
        </details>
        <details id="machine_card">
            <summary id="header_card">🏋️Machine</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Chest Press (3 sets, 10 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Pec Deck (3 sets, 12 reps)</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Triceps Pushdown (3 sets, 12 reps)</span>
                </label>
            </div>
        </details>

        <details id="stretching">
            <summary id="header_card">🧘‍♀️Stretching (5 mins)</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Lat Stretch</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Chest Opener</span>
                </label>
            </div>
        </details>
        <details id="cardio">
            <summary id="header_card">🏃‍♂️Cardio</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Japanese Walking Method: 30 mins</span>
                </label>
            </div>
        </details>
        <details id="sauna">
            <summary id="header_card">♨️Sauna</summary>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>15-20 mins</span>
                </label>
            </div>
            <br>
            <div id="exercise">
                <label class="exercise-label">
                    <input type="checkbox">
                    <span>Rehydrate After</span>
                    <img src="https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyNWhicm1kNDJkY2x4cDUzNnIwbTNyMnZ5NTEwaGd1c2l3MHhsZTA5ciZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/XEHhfEvGc89ablCLXz/200.gif" alt="rehydrate">
                </label>
            </div>
        </details>
    </body>
</html>
